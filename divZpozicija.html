<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preslagivanje divova</title>
    <style>
        .podloga {
            position: relative;
        }

        #Sivi {
            position: relative;
            height: 150px;
            width: 200px;
            background-color: grey;
            z-index: 2;
        }

        #Zeleni {
            position: absolute;
            height: 50px;
            width: 30%;
            left: 100px;
            top: 50px;
            background-color: green;
            z-index: 3;
        }

        #Plavi {
            position: absolute;
            height: 50px;
            width: 30%;
            left: 140px;
            top: 70px;
            background-color: rgb(0, 2, 128);
            z-index: 1;
        }
    </style>
</head>

<body>
    <h1> Preklapanje div elemenata</h1>
    <div class="podloga">
        <div id="Sivi">
            Ovo je Sivi div
        </div>
        <div id="Zeleni">
            Ovo je Zeleni div
        </div>
        <div id="Plavi">
            Ovo je Plavi div
        </div>
    </div>
</body>

</html>
