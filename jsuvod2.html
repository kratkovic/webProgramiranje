<body>
    <script>
        let datum = new Date();
        let sat = datum.getHours();
        if(sat >= 19){
            window.alert('Fajront!');
        }else{
            window.alert('Još treba raditi!');
        }
        let datum2 = new Date();
        sat = datum2.setHours(15,15);
        window.alert('Postavili smo datum'+ sat);
    </script>

</body>
