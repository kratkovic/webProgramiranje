<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primjer tablice</title>
</head>
<body>

    <h2>Tablica</h2>

    <table border="3">
        <tr>
            <th>Redni broj</th>
            <th>Ime</th>
            <th>Prezime</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Ivan</td>
            <td>Ivić</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Petra</td>
            <td>Petrović</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Marko</td>
            <td>Markić</td>
        </tr>
    </table>

</body>
</html>
